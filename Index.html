<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Treino 5D">
<meta name="theme-color" content="#0b0b0d">
<title>Treino 5D</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Epilogue:wght@300;400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ─── RESET & ROOT ─────────────────────────────────────── */
:root {
  --bg:#0b0b0d; --s1:#111114; --s2:#18181d; --s3:#1f1f26;
  --b1:#252530; --b2:#32323f; --b3:#42424f;
  --txt:#edeaf8; --mut:#6e6c80; --dim:#3e3c4e;
  --A:#e8693a; --B:#4a9eff; --C:#44d47a; --D:#f0c040; --E:#c084fc;
  --safe-top: env(safe-area-inset-top);
  --safe-bot: env(safe-area-inset-bottom);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
body {
  background:var(--bg); color:var(--txt);
  font-family:'Epilogue',sans-serif;
  min-height:100dvh; overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* ─── SCREENS ──────────────────────────────────────────── */
.screen { display:none; min-height:100dvh; flex-direction:column; }
.screen.active { display:flex; }

/* ─── SPLASH ───────────────────────────────────────────── */
#splash {
  background:var(--bg);
  align-items:center; justify-content:center; gap:20px;
  padding-top:var(--safe-top);
}
.splash-icon {
  width:88px; height:88px; border-radius:22px;
  background:linear-gradient(135deg,#e8693a,#c84b2f);
  display:flex; align-items:center; justify-content:center;
  font-size:42px; box-shadow:0 20px 60px rgba(232,105,58,.35);
}
.splash-title {
  font-family:'Syne',sans-serif; font-size:32px; font-weight:800;
  letter-spacing:-.02em; text-align:center;
}
.splash-title span { color:var(--A); }
.splash-sub { font-size:13px; color:var(--mut); text-align:center; font-weight:300; }
.splash-progress {
  width:180px; height:3px; background:var(--b1);
  border-radius:99px; overflow:hidden; margin-top:8px;
}
.splash-bar {
  height:100%; background:var(--A); border-radius:99px;
  width:0; animation:loadbar 1.6s ease-out forwards;
}
@keyframes loadbar { to { width:100%; } }

/* ─── TOP BAR ──────────────────────────────────────────── */
.topbar {
  position:sticky; top:0; z-index:100;
  background:rgba(11,11,13,.9); backdrop-filter:blur(20px);
  padding:calc(var(--safe-top) + 10px) 16px 10px;
  border-bottom:1px solid var(--b1);
  display:flex; align-items:center; gap:12px;
}
.topbar-back {
  width:36px; height:36px; border-radius:10px;
  background:var(--s2); border:1px solid var(--b1);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; flex-shrink:0; font-size:18px; color:var(--txt);
  transition:background .15s;
}
.topbar-back:active { background:var(--b2); }
.topbar-title { font-family:'Syne',sans-serif; font-size:17px; font-weight:800; flex:1; }
.topbar-actions { display:flex; gap:8px; }
.topbar-btn {
  height:36px; padding:0 14px; border-radius:10px;
  background:var(--s2); border:1px solid var(--b1);
  font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
  color:var(--txt); cursor:pointer; letter-spacing:.04em; text-transform:uppercase;
  display:flex; align-items:center; gap:6px; transition:background .15s;
}
.topbar-btn:active { background:var(--b2); }

/* ─── HOME SCREEN ──────────────────────────────────────── */
#home { padding-bottom:calc(var(--safe-bot) + 16px); overflow-y:auto; }
.home-header {
  padding:calc(var(--safe-top) + 20px) 20px 24px;
  background:linear-gradient(180deg,var(--s1) 0%,transparent 100%);
}
.home-greeting { font-size:13px; color:var(--mut); margin-bottom:4px; font-weight:300; }
.home-title { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; letter-spacing:-.02em; margin-bottom:16px; }
.home-title span { color:var(--A); }

/* STREAK BAR */
.streak-bar {
  display:flex; gap:6px; margin-bottom:20px;
}
.streak-day {
  flex:1; border-radius:8px; padding:10px 4px; text-align:center;
  background:var(--s2); border:1px solid var(--b1); cursor:pointer;
  transition:all .15s;
}
.streak-day:active { transform:scale(.95); }
.streak-day .sd-lbl { font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:5px; }
.streak-day .sd-letter { font-family:'Syne',sans-serif; font-size:18px; font-weight:800; line-height:1; }
.streak-day .sd-dot { width:6px; height:6px; border-radius:50%; background:var(--dim); margin:5px auto 0; }
.streak-day.done .sd-dot { background:var(--C); }
.streak-day.A { border-color:rgba(232,105,58,.3); } .streak-day.A .sd-letter { color:var(--A); }
.streak-day.B { border-color:rgba(74,158,255,.3); } .streak-day.B .sd-letter { color:var(--B); }
.streak-day.C { border-color:rgba(68,212,122,.3); } .streak-day.C .sd-letter { color:var(--C); }
.streak-day.D { border-color:rgba(240,192,64,.3); } .streak-day.D .sd-letter { color:var(--D); }
.streak-day.E { border-color:rgba(192,132,252,.3); } .streak-day.E .sd-letter { color:var(--E); }
.streak-day.rest { opacity:.4; }

/* TODAY CARD */
.today-card {
  border-radius:16px; padding:20px; margin-bottom:16px;
  background:linear-gradient(135deg,var(--s2),var(--s1));
  border:1px solid var(--b1); position:relative; overflow:hidden;
}
.today-card::before {
  content:''; position:absolute; top:-40px; right:-40px;
  width:160px; height:160px; border-radius:50%;
  background:radial-gradient(circle,rgba(232,105,58,.12),transparent 70%);
}
.today-lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--mut); margin-bottom:8px; }
.today-name { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; margin-bottom:4px; }
.today-sub { font-size:13px; color:var(--mut); font-weight:300; margin-bottom:18px; }
.today-meta { display:flex; gap:10px; margin-bottom:20px; }
.tmeta { background:var(--s3); border:1px solid var(--b1); border-radius:8px; padding:8px 12px; text-align:center; }
.tmeta-v { font-family:'JetBrains Mono',monospace; font-size:16px; font-weight:700; line-height:1; }
.tmeta-l { font-size:10px; color:var(--mut); margin-top:3px; letter-spacing:.06em; text-transform:uppercase; }
.btn-start {
  width:100%; height:52px; border-radius:14px; border:none;
  font-family:'Syne',sans-serif; font-size:17px; font-weight:800;
  letter-spacing:.02em; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px;
  transition:transform .1s, box-shadow .1s;
}
.btn-start:active { transform:scale(.97); }
.btn-start.A { background:linear-gradient(135deg,#e8693a,#c84b2f); color:#fff; box-shadow:0 8px 30px rgba(232,105,58,.35); }
.btn-start.B { background:linear-gradient(135deg,#4a9eff,#2878d8); color:#fff; box-shadow:0 8px 30px rgba(74,158,255,.35); }
.btn-start.C { background:linear-gradient(135deg,#44d47a,#28a854); color:#fff; box-shadow:0 8px 30px rgba(68,212,122,.35); }
.btn-start.D { background:linear-gradient(135deg,#f0c040,#d09820); color:#111; box-shadow:0 8px 30px rgba(240,192,64,.35); }
.btn-start.E { background:linear-gradient(135deg,#c084fc,#9050d8); color:#fff; box-shadow:0 8px 30px rgba(192,132,252,.35); }

/* HOME DAY LIST */
.section-label { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--mut); padding:0 20px 10px; }
.day-list { display:flex; flex-direction:column; gap:6px; padding:0 16px; }
.day-row {
  background:var(--s1); border:1px solid var(--b1); border-radius:14px;
  padding:16px; display:flex; align-items:center; gap:14px;
  cursor:pointer; transition:background .15s;
}
.day-row:active { background:var(--s2); }
.day-row .dr-letter {
  width:44px; height:44px; border-radius:12px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Syne',sans-serif; font-size:20px; font-weight:800;
}
.day-row.A .dr-letter { background:rgba(232,105,58,.15); color:var(--A); }
.day-row.B .dr-letter { background:rgba(74,158,255,.15); color:var(--B); }
.day-row.C .dr-letter { background:rgba(68,212,122,.15); color:var(--C); }
.day-row.D .dr-letter { background:rgba(240,192,64,.15); color:var(--D); }
.day-row.E .dr-letter { background:rgba(192,132,252,.15); color:var(--E); }
.day-row .dr-info { flex:1; min-width:0; }
.day-row .dr-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.day-row .dr-sub { font-size:12px; color:var(--mut); font-weight:300; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.day-row .dr-right { text-align:right; flex-shrink:0; }
.day-row .dr-count { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--mut); }
.day-row .dr-done { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--C); }
.dr-chevron { color:var(--b3); font-size:16px; flex-shrink:0; }

/* STATS STRIP */
.stats-strip {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:8px; padding:16px; margin-top:4px;
}
.sstat {
  background:var(--s1); border:1px solid var(--b1); border-radius:12px;
  padding:14px 12px; text-align:center;
}
.sstat-val { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; line-height:1; }
.sstat-lbl { font-size:10.5px; color:var(--mut); margin-top:4px; }

/* ─── WORKOUT SCREEN ───────────────────────────────────── */
#workout { overflow-y:auto; padding-bottom:calc(var(--safe-bot) + 100px); }

/* WORKOUT HEADER */
.wk-hero {
  padding:16px 16px 20px;
  border-bottom:1px solid var(--b1); margin-bottom:4px;
}
.wk-phase-badge {
  display:inline-flex; align-items:center; gap:6px;
  font-family:'JetBrains Mono',monospace; font-size:9.5px;
  letter-spacing:.12em; text-transform:uppercase;
  padding:4px 10px; border-radius:6px; border:1px solid; margin-bottom:12px;
}
.wk-progress-wrap { margin-top:12px; }
.wk-progress-lbl { display:flex; justify-content:space-between; font-size:11px; color:var(--mut); margin-bottom:6px; }
.wk-progress-bar { height:4px; background:var(--b1); border-radius:99px; overflow:hidden; }
.wk-progress-fill { height:100%; border-radius:99px; transition:width .4s ease; }

/* PHASE SECTION */
.phase-section { margin:0 16px 4px; }
.phase-hd {
  display:flex; align-items:center; gap:8px;
  padding:12px 0 8px;
}
.phase-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.phase-hd-txt { font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--mut); }

/* EXERCISE CARD */
.exc {
  background:var(--s1); border:1px solid var(--b1);
  border-radius:14px; margin-bottom:8px; overflow:hidden;
}
.exc.hl { border-left-width:3px; }
.exc-header {
  padding:14px 14px 0;
  display:flex; align-items:flex-start; gap:12px; cursor:pointer;
}
.exc-expand-btn {
  width:30px; height:30px; border-radius:8px; background:var(--s2);
  border:1px solid var(--b1); flex-shrink:0; margin-top:1px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; transition:transform .2s;
}
.exc.open .exc-expand-btn { transform:rotate(180deg); }
.exc-title-block { flex:1; min-width:0; }
.exc-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; line-height:1.3; margin-bottom:4px; }
.exc-badges { display:flex; gap:4px; flex-wrap:wrap; }
.exc-badge {
  font-family:'JetBrains Mono',monospace; font-size:8.5px;
  letter-spacing:.05em; text-transform:uppercase;
  padding:2px 7px; border-radius:3px; border:1px solid;
}

/* SETS TABLE */
.sets-area { padding:12px 14px 14px; }
.sets-header {
  display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px;
  gap:8px; margin-bottom:8px;
}
.sets-header span {
  font-family:'JetBrains Mono',monospace; font-size:9px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--mut); text-align:center;
}
.sets-header span:first-child { text-align:left; }
.set-row {
  display:grid; grid-template-columns:28px 1fr 1fr 1fr 36px;
  gap:8px; align-items:center; margin-bottom:6px;
}
.set-num {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  font-weight:700; color:var(--mut); text-align:left;
}
.set-input {
  background:var(--s2); border:1px solid var(--b2);
  border-radius:9px; height:40px; width:100%;
  font-family:'JetBrains Mono',monospace; font-size:15px;
  font-weight:700; color:var(--txt); text-align:center;
  -webkit-appearance:none; outline:none;
  transition:border-color .15s, background .15s;
}
.set-input:focus { border-color:var(--A); background:var(--s3); }
.set-input::placeholder { color:var(--dim); }
.set-done-btn {
  width:36px; height:36px; border-radius:9px;
  background:var(--s2); border:1px solid var(--b2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:16px; transition:all .15s;
}
.set-done-btn.done { background:rgba(68,212,122,.15); border-color:rgba(68,212,122,.4); }
.set-done-btn:active { transform:scale(.9); }

.add-set-btn {
  width:100%; height:36px; border-radius:9px;
  background:var(--s2); border:1px dashed var(--b2);
  color:var(--mut); font-family:'JetBrains Mono',monospace; font-size:11px;
  letter-spacing:.08em; text-transform:uppercase; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:6px;
  margin-top:4px; transition:background .15s;
}
.add-set-btn:active { background:var(--b1); }

/* CLINICAL NOTE (collapsed) */
.exc-clinical-bar {
  padding:0 14px 12px; display:none;
}
.exc.open .exc-clinical-bar { display:block; }
.exc-clinical-txt {
  font-size:11.5px; color:var(--mut); font-style:italic;
  line-height:1.65; background:var(--s2); border-radius:8px;
  padding:10px 12px; border:1px solid var(--b1);
}
.exc-tip-txt {
  font-size:11px; color:var(--dim); line-height:1.5;
  padding:8px 12px 0; border-top:1px solid var(--b1); margin-top:8px;
}
.exc-tip-txt::before { content:'↳ '; font-family:'JetBrains Mono',monospace; color:var(--b3); }

/* IMAGES STRIP */
.exc-imgs { display:grid; grid-template-columns:1fr 1fr; border-top:1px solid var(--b1); display:none; }
.exc.open .exc-imgs { display:grid; }
.exc-img-box { position:relative; height:160px; overflow:hidden; }
.exc-img-box img {
  width:100%; height:100%; object-fit:cover;
  filter:brightness(.8) saturate(.85);
  transition:filter .3s; display:block;
}
.exc-img-lbl {
  position:absolute; bottom:0; left:0; right:0;
  padding:5px 8px;
  font-family:'JetBrains Mono',monospace; font-size:8.5px;
  letter-spacing:.08em; text-transform:uppercase;
  background:linear-gradient(transparent,rgba(11,11,13,.82));
  color:rgba(237,234,248,.65);
}

/* SUPERSET WRAP */
.superset-block {
  border:1px dashed var(--b2); border-radius:14px;
  padding:8px; position:relative; margin-bottom:8px;
}
.superset-lbl {
  position:absolute; top:-9px; left:14px;
  background:var(--bg); padding:0 8px;
  font-family:'JetBrains Mono',monospace; font-size:8.5px;
  letter-spacing:.1em; text-transform:uppercase; color:var(--dim);
}
.superset-block .exc { background:rgba(11,11,13,.5); }

/* REST TIMER */
.rest-timer-float {
  position:fixed; bottom:calc(var(--safe-bot) + 90px); left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--s2); border:1px solid var(--b2);
  border-radius:16px; padding:12px 20px;
  display:flex; align-items:center; gap:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  opacity:0; pointer-events:none;
  transition:opacity .25s, transform .25s;
  z-index:50; white-space:nowrap;
}
.rest-timer-float.show {
  opacity:1; transform:translateX(-50%) translateY(0);
  pointer-events:all;
}
.rt-icon { font-size:22px; }
.rt-label { font-size:12px; color:var(--mut); }
.rt-time { font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:700; line-height:1; }
.rt-skip { background:var(--b1); border:none; border-radius:8px; padding:6px 12px; color:var(--mut); font-family:'JetBrains Mono',monospace; font-size:11px; cursor:pointer; }
.rt-skip:active { background:var(--b2); }

/* WORKOUT BOTTOM BAR */
.wk-bottom {
  position:fixed; bottom:0; left:0; right:0; z-index:40;
  background:rgba(11,11,13,.95); backdrop-filter:blur(20px);
  border-top:1px solid var(--b1);
  padding:12px 16px calc(var(--safe-bot) + 12px);
  display:flex; gap:10px;
}
.wk-elapsed {
  background:var(--s2); border:1px solid var(--b1); border-radius:12px;
  padding:0 14px; display:flex; align-items:center; gap:8px; flex-shrink:0;
}
.wk-elapsed-time { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; }
.btn-finish {
  flex:1; height:50px; border-radius:12px; border:none;
  font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:.02em; cursor:pointer; transition:transform .1s;
}
.btn-finish:active { transform:scale(.97); }

/* CARDIO SECTION */
.cardio-card {
  margin:8px 16px; background:var(--s1);
  border:1px solid rgba(74,158,255,.2); border-radius:14px; padding:16px;
}
.cardio-title { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--B); margin-bottom:14px; }
.cardio-segs { display:flex; gap:4px; margin-bottom:12px; }
.cseg { border-radius:8px; padding:10px 8px; flex:1; }
.cseg-time { font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; line-height:1; margin-bottom:3px; }
.cseg-name { font-size:10.5px; font-weight:600; margin-bottom:2px; }
.cseg-desc { font-size:9.5px; opacity:.65; line-height:1.4; }
.cseg-warm { background:rgba(68,212,122,.08); border:1px solid rgba(68,212,122,.2); }
.cseg-main { background:rgba(74,158,255,.08); border:1px solid rgba(74,158,255,.2); }
.cseg-inter { background:rgba(240,192,64,.08); border:1px solid rgba(240,192,64,.2); }
.cseg-cool { background:rgba(192,132,252,.08); border:1px solid rgba(192,132,252,.2); }
.cardio-note { font-size:11.5px; color:var(--mut); font-style:italic; line-height:1.6; }

/* CARDIO TIMER */
.cardio-timer-wrap { margin:8px 16px; }
.cardio-timer-btn {
  width:100%; height:52px; border-radius:13px; border:none;
  background:rgba(74,158,255,.12); border:1px solid rgba(74,158,255,.3);
  color:var(--B); font-family:'Syne',sans-serif; font-size:16px; font-weight:800;
  letter-spacing:.03em; cursor:pointer; display:flex; align-items:center;
  justify-content:center; gap:8px; transition:background .15s;
}
.cardio-timer-btn:active { background:rgba(74,158,255,.2); }
.cardio-timer-btn.running { background:rgba(255,95,95,.1); border-color:rgba(255,95,95,.3); color:#ff5f5f; }

/* SUMMARY SCREEN */
#summary { overflow-y:auto; padding-bottom:calc(var(--safe-bot) + 20px); }
.summary-hero {
  padding:calc(var(--safe-top) + 24px) 20px 24px; text-align:center;
}
.summary-icon { font-size:64px; margin-bottom:12px; }
.summary-title { font-family:'Syne',sans-serif; font-size:30px; font-weight:800; letter-spacing:-.02em; margin-bottom:6px; }
.summary-sub { font-size:14px; color:var(--mut); font-weight:300; }
.summary-stats {
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:8px; padding:0 16px 20px;
}
.sumstat { background:var(--s1); border:1px solid var(--b1); border-radius:12px; padding:16px; text-align:center; }
.sumstat-val { font-family:'Syne',sans-serif; font-size:24px; font-weight:800; line-height:1; margin-bottom:4px; }
.sumstat-lbl { font-size:11px; color:var(--mut); }
.summary-list { padding:0 16px; }
.sum-ex {
  background:var(--s1); border:1px solid var(--b1); border-radius:12px;
  padding:14px; margin-bottom:8px;
}
.sum-ex-name { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; margin-bottom:8px; }

::-webkit-scrollbar { width:0; }

function saveLocal(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
function loadLocal(key, def) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e){ return def; } }

function getHistory() { return loadLocal('wk_history', []); }
function saveHistory(h) { saveLocal('wk_history', h); }
function getLastLoads() { return loadLocal('wk_loads', {}); }
function saveLastLoads(l) { saveLocal('wk_loads', l); }
function getStreakDays() { return loadLocal('wk_streak', {}); }
function saveStreakDays(s) { saveLocal('wk_streak', s); }

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════
//  START WORKOUT
// ═══════════════════════════════════════════════════════
function startWorkout(dayId) {
  const day = DAYS.find(d => d.id === dayId);
  if(!day) return;
  currentDayId = dayId;
  setsData = {};
  totalSets = 0;
  doneSets = 0;
  workoutStart = Date.now();

  const lastLoads = getLastLoads();

  // Build sets data
  day.phases.forEach(ph => {
    ph.exercises.forEach(ex => {
      const lastLoad = lastLoads[ex.id] || {};
      setsData[ex.id] = [];
      for(let i=0;i<ex.sets;i++) {
        setsData[ex.id].push({
          load: lastLoad[i]?.load || '',
          reps: lastLoad[i]?.reps || ex.reps,
          done: false
        });
        totalSets++;
      }
    });
  });

  // Render
  document.getElementById('wkTitle').textContent = `Dia ${dayId} · ${day.name}`;
  const badge = document.getElementById('wkBadge');
  badge.style.cssText = `color:${day.color};border-color:${day.color}40;background:${day.color}12`;
  badge.textContent = `${day.day} · ${day.duration}' + ${day.cardio}' cardio`;

  renderWorkout(day);
  updateWkProgress();

  showScreen('workout');

  // Start elapsed timer
  if(workoutTimer) clearInterval(workoutTimer);
  workoutTimer = setInterval(updateWkClock, 1000);
}

function renderWorkout(day) {
  const container = document.getElementById('wkContent');
  let html = '';

  day.phases.forEach(ph => {
    if(ph.superset) {
      html += `<div class="phase-section"><div class="phase-hd"><div class="phase-dot" style="background:${ph.color}"></div><div class="phase-hd-txt">${ph.label}</div></div>`;
      html += `<div class="superset-block"><div class="superset-lbl">${ph.label}</div><div style="height:6px"></div>`;
      ph.exercises.forEach(ex => { html += renderExCard(ex, day); });
      html += `</div></div>`;
    } else {
      html += `<div class="phase-section"><div class="phase-hd"><div class="phase-dot" style="background:${ph.color}"></div><div class="phase-hd-txt">${ph.label}</div></div>`;
      ph.exercises.forEach(ex => { html += renderExCard(ex, day); });
      html += `</div>`;
    }
  });

  // Cardio
  html += renderCardioSection(day.cardioData);

  container.innerHTML = html;
}

  const sets = setsData[ex.id] || [];
  const hasImgs = ex.imgs && ex.imgs[0] && ex.imgs[1];
  const imgLbls = ex.imgLbls || ['Posição Inicial','Execução'];

  let setsHtml = `
    <div class="sets-area">
      <div class="sets-header">

  sets.forEach((s,i) => {
    setsHtml += `
      <div class="set-row" id="setrow_${ex.id}_${i}">
        <div class="set-num">${i+1}</div>

               value="${s.load}" onchange="updateSet('${ex.id}',${i},'load',this.value)"
               style="${s.done ? 'opacity:.5' : ''}">
        <input class="set-input" type="text" inputmode="text" placeholder="${ex.reps}"
               value="${s.reps !== ex.reps ? s.reps : ''}" 
               onchange="updateSet('${ex.id}',${i},'reps',this.value)"
               style="${s.done ? 'opacity:.5' : ''}">
        <input class="set-input" type="text" inputmode="text" placeholder="${ex.rest>0 ? ex.rest+'s' : '—'}" readonly
               style="opacity:.4;cursor:default">
        <div class="set-done-btn ${s.done ? 'done' : ''}" id="doneBtn_${ex.id}_${i}"

  });
  setsHtml += `
      <button class="add-set-btn" onclick="addSet('${ex.id}','${ex.reps}','${ex.rest}')">+ Adicionar Série</button>
    </div>`;

  let imgsHtml = '';
  if(hasImgs) {
    imgsHtml = `<div class="exc-imgs">
      <div class="exc-img-box">

  const hlColor = ex.hl ? (day.color) : 'transparent';

  return `
    <div class="exc ${ex.hl?'hl':''}" id="exc_${ex.id}" 
         style="${ex.hl ? `border-left-color:${day.color}` : ''}">
      <div class="exc-header" onclick="toggleEx('${ex.id}')">
        <div class="exc-expand-btn" id="expBtn_${ex.id}">▾</div>
        <div class="exc-title-block">
          <div class="exc-name">${ex.name}</div>
          <div class="exc-badges">
            <span class="exc-badge ${ex.badgeClass}">${ex.badge}</span>
          </div>
        </div>
      </div>
      ${setsHtml}
      <div class="exc-clinical-bar">
        <div class="exc-clinical-txt">
          ${ex.clinical}
          <div class="exc-tip-txt">${ex.tip}</div>
        </div>
      </div>
      ${imgsHtml}
    </div>`;
}

function renderCardioSection(cd) {
  const segs = cd.segs.map(s => `
    <div class="cseg ${s.cls}">
      <div class="cseg-time" style="color:${s.col}">${s.t}'</div>
      <div class="cseg-name">${s.n}</div>
      <div class="cseg-desc">${s.d}</div>
    </div>`).join('');
  
  return `
    <div class="cardio-card">
      <div class="cardio-title">◆ ${cd.title}</div>
      <div class="cardio-segs">${segs}</div>
      <div class="cardio-note">${cd.note}</div>
    </div>
    <div class="cardio-timer-wrap">
      <button class="cardio-timer-btn" id="cardioTimerBtn" onclick="toggleCardioTimer()">
        <span id="cardioTimerIcon">▶</span>
        <span id="cardioTimerTxt">Iniciar Cardio</span>
      </button>
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  EXERCISE INTERACTIONS
// ═══════════════════════════════════════════════════════
function toggleEx(exId) {
  const card = document.getElementById(`exc_${exId}`);
  card.classList.toggle('open');
}

function updateSet(exId, idx, field, val) {
  if(!setsData[exId]) return;
  setsData[exId][idx][field] = val;
}

function toggleSetDone(exId, idx) {
  if(!setsData[exId]) return;
  const s = setsData[exId][idx];
  s.done = !s.done;
  
  const btn = document.getElementById(`doneBtn_${exId}_${idx}`);
  const row = document.getElementById(`setrow_${exId}_${idx}`);
  
  if(s.done) {
    btn.classList.add('done'); btn.textContent = '✓';
    row.querySelectorAll('.set-input:not([readonly])').forEach(i => i.style.opacity='.5');
    doneSets++;
    if(s.rest) startRestTimer(s.rest);
  } else {
    btn.classList.remove('done'); btn.textContent = '○';
    row.querySelectorAll('.set-input:not([readonly])').forEach(i => i.style.opacity='1');
    doneSets = Math.max(0, doneSets - 1);
  }
  updateWkProgress();
}

function addSet(exId, defaultReps, defaultRest) {
  if(!setsData[exId]) return;
  const lastLoads = getLastLoads();
  const last = setsData[exId][setsData[exId].length-1];
  const newSet = { load: last?.load||'', reps: defaultReps, done: false, rest: parseInt(defaultRest)||0 };
  setsData[exId].push(newSet);
  totalSets++;
  
  const container = document.getElementById(`exc_${exId}`);
  const setsArea = container.querySelector('.sets-area');
  const addBtn = setsArea.querySelector('.add-set-btn');
  const i = setsData[exId].length - 1;
  
  const rowHtml = `
    <div class="set-row" id="setrow_${exId}_${i}">
      <div class="set-num">${i+1}</div>
      <input class="set-input" type="number" inputmode="decimal" placeholder="—" 
             value="${newSet.load}" onchange="updateSet('${exId}',${i},'load',this.value)">
      <input class="set-input" type="text" inputmode="text" placeholder="${defaultReps}"
             onchange="updateSet('${exId}',${i},'reps',this.value)">
      <input class="set-input" type="text" inputmode="text" placeholder="${parseInt(defaultRest)>0?defaultRest+'s':'—'}" readonly style="opacity:.4;cursor:default">
      <div class="set-done-btn" id="doneBtn_${exId}_${i}" onclick="toggleSetDone('${exId}',${i})">○</div>
    </div>`;
  addBtn.insertAdjacentHTML('beforebegin', rowHtml);
  updateWkProgress();
  showToast('Série adicionada ✓');
}

function updateWkProgress() {
  const pct = totalSets > 0 ? (doneSets/totalSets)*100 : 0;
  const day = DAYS.find(d => d.id === currentDayId);
  document.getElementById('wkProgFill').style.width = pct+'%';
  document.getElementById('wkProgFill').style.background = day?.color||'var(--A)';
  document.getElementById('wkProgLbl').textContent = `${doneSets} / ${totalSets} séries`;
  const btn = document.getElementById('btnFinish');
  if(btn) {
    btn.style.background = day?.color || 'var(--A)';
    btn.style.color = day?.id === 'D' ? '#111' : '#fff';
  }
}

function updateWkClock() {
  const elapsed = Math.floor((Date.now() - workoutStart) / 1000);
  const m = String(Math.floor(elapsed/60)).padStart(2,'0');
  const s = String(elapsed%60).padStart(2,'0');
  const el = document.getElementById('wkElapsed');
  if(el) el.textContent = `${m}:${s}`;
  const tl = document.getElementById('wkTimeLbl');
  if(tl) tl.textContent = `${m}:${s}`;
}

// ═══════════════════════════════════════════════════════
//  REST TIMER
// ═══════════════════════════════════════════════════════
function startRestTimer(seconds) {
  if(restTimerTimeout) { clearTimeout(restTimerTimeout); clearInterval(restTimerInterval); }
  const el = document.getElementById('restTimer');
  const timeEl = document.getElementById('rtTime');
  let remaining = seconds;
  el.classList.add('show');
  timeEl.textContent = remaining;
  restTimerInterval = setInterval(() => {
    remaining--;
    timeEl.textContent = remaining;
    if(remaining <= 0) skipRest();
  }, 1000);
}

function skipRest() {
  clearInterval(restTimerInterval);
  clearTimeout(restTimerTimeout);
  document.getElementById('restTimer').classList.remove('show');
}

// ═══════════════════════════════════════════════════════
//  CARDIO TIMER
// ═══════════════════════════════════════════════════════
function toggleCardioTimer() {
  const btn = document.getElementById('cardioTimerBtn');
  const icon = document.getElementById('cardioTimerIcon');
  const txt = document.getElementById('cardioTimerTxt');
  if(!cardioRunning) {
    cardioTimerStart = Date.now();
    cardioRunning = true;
    btn.classList.add('running');
    icon.textContent = '■';
    txt.textContent = 'Cardio em andamento — 00:00';
    cardioTimerInterval = setInterval(() => {
      const e = Math.floor((Date.now()-cardioTimerStart)/1000);
      const m = String(Math.floor(e/60)).padStart(2,'0');
      const s = String(e%60).padStart(2,'0');
      if(txt) txt.textContent = `Cardio em andamento — ${m}:${s}`;
    }, 1000);
  } else {
    clearInterval(cardioTimerInterval);
    const e = Math.floor((Date.now()-cardioTimerStart)/1000);
    const m = Math.floor(e/60);
    cardioRunning = false;
    btn.classList.remove('running');
    icon.textContent = '▶';
    txt.textContent = `Cardio concluído — ${m} min ✓`;
    btn.style.background = 'rgba(68,212,122,.12)';
    btn.style.borderColor = 'rgba(68,212,122,.3)';
    btn.style.color = 'var(--C)';
    showToast(`Cardio: ${m} min ✓`);
  }
}

// ═══════════════════════════════════════════════════════
//  FINISH WORKOUT
// ═══════════════════════════════════════════════════════
function finishWorkout() {
  if(workoutTimer) clearInterval(workoutTimer);
  if(restTimerInterval) clearInterval(restTimerInterval);
  if(cardioTimerInterval) clearInterval(cardioTimerInterval);
  cardioRunning = false;

  const durationMs = Date.now() - workoutStart;
  const durationMin = Math.round(durationMs / 60000);
  const day = DAYS.find(d => d.id === currentDayId);

  // Save loads
  const lastLoads = getLastLoads();
  Object.entries(setsData).forEach(([exId, sets]) => {
    lastLoads[exId] = sets.map(s => ({ load: s.load, reps: s.reps }));
  });
  saveLastLoads(lastLoads);

  // Save history
  const now = new Date();
  const dateStr = now.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
  const entry = {
    id: Date.now(),
    dayId: currentDayId,
    dayName: day.name,
    dateStr,
    durationMin,
    setsCount: doneSets,
    sets: JSON.parse(JSON.stringify(setsData))
  };
  const hist = getHistory();
  hist.push(entry);
  saveHistory(hist);

  // Mark streak
  const streak = getStreakDays();
  streak[currentDayId] = dateStr;
  // Reset if all done
  if(['A','B','C','D','E'].every(id => streak[id])) {
    ['A','B','C','D','E'].forEach(id => delete streak[id]);
  }
  saveStreakDays(streak);

  // Show summary
  showSummary(day, entry);
}

function showSummary(day, entry) {
  document.getElementById('sumTitle').textContent = `Dia ${day.id} Concluído!`;
  document.getElementById('sumSub').textContent = `${day.name} · ${entry.dateStr}`;
  document.getElementById('sumDur').textContent = entry.durationMin + "'";
  document.getElementById('sumSets').textContent = entry.setsCount;
  
  let exCount = 0;
  const sl = document.getElementById('summaryList');
  let html = '';
  day.phases.forEach(ph => {
    ph.exercises.forEach(ex => {
      const sets = entry.sets[ex.id] || [];
      const doneSetsEx = sets.filter(s => s.done);
      if(doneSetsEx.length > 0 || sets.some(s => s.load)) {
        exCount++;
        const pillsHtml = sets.map((s,i) => `
          <span class="sum-set-pill ${s.done?'done-pill':''}">
            S${i+1}${s.load?' · '+s.load+'kg':''}${s.reps?' · '+s.reps:''}
          </span>`).join('');
        html += `
          <div class="sum-ex">
            <div class="sum-ex-name">${ex.name}</div>
            <div class="sum-sets">${pillsHtml || '<span style="color:var(--mut);font-size:11px">Não registrado</span>'}</div>
          </div>`;
      }
    });
  });
  sl.innerHTML = html;
  document.getElementById('sumExs').textContent = exCount;
  showScreen('summary');
}

function goHome() {
  showScreen('home');
  renderHome();
}

function confirmLeave() {
  if(doneSets > 0) {
    if(confirm('Deseja sair? O progresso será perdido.')) {
      if(workoutTimer) clearInterval(workoutTimer);
      if(restTimerInterval) clearInterval(restTimerInterval);
      skipRest();
      showScreen('home');
    }
  } else {
    if(workoutTimer) clearInterval(workoutTimer);
    skipRest();
    showScreen('home');
  }
}

// ═══════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════
function showHistory() { renderHistoryScreen(); showScreen('history'); }

function renderHistoryScreen() {
  const hist = [...getHistory()].reverse();
  const hl = document.getElementById('histList');
  if(hist.length === 0) {
    hl.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-title">Nenhum treino ainda</div>
      <div class="empty-sub">Complete seu primeiro treino<br>para ver o histórico aqui.</div>
    </div>`;
    return;
  }
  hl.innerHTML = hist.map(e => {
    const d = DAYS.find(d => d.id === e.dayId);
    return `<div class="hist-entry">
      <div class="hist-badge" style="background:${d?`rgba(255,255,255,.07)`:'var(--s2)'};color:${d?d.color:'var(--txt)'}">
        ${e.dayId}
      </div>
      <div class="hist-info">
        <div class="hist-name">${e.dayName}</div>
        <div class="hist-date">${e.dateStr}</div>
      </div>
      <div class="hist-right">
        <div class="hist-dur" style="color:${d?.color||'var(--txt)'}">${e.durationMin}'</div>
        <div class="hist-sets">${e.setsCount} séries</div>
      </div>
    </div>`;
  }).join('');
}

function clearHistory() {
  if(confirm('Apagar todo o histórico?')) {
    saveHistory([]);
    saveLastLoads({});
    saveStreakDays({});
    renderHistoryScreen();
    showToast('Histórico apagado');
  }
}

// ═══════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════
let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if(toastTimeout) clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

// ═══════════════════════════════════════════════════════
//  SERVICE WORKER (PWA offline)
// ═══════════════════════════════════════════════════════
if('serviceWorker' in navigator) {
  const swCode = `
    const CACHE='treino5d-v1';
    const ASSETS=['./'];
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./')))));
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
